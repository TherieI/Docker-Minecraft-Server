services:
  mc:
    image: itzg/minecraft-server
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "NEOFORGE"
      VERSION: "1.21.1"
      MEMORY: "4096M"
      USE_MEOWICE_FLAGS: "true"
      DATAPACKS: "/datapacks/idle_timeout"
      RCON_PASSWORD: "poop"
      OPS: "Theriel"
      FUNCTION_PERMISSION_LEVEL: 4
      RCON_CMDS_STARTUP: |-
        function idle_timeout:init
      RCON_CMDS_LAST_DISCONNECT: |-
        function idle_timeout:lastplayerleave
    volumes:
      - "./data:/data"
      - "./datapacks:/datapacks"
